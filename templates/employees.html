<!DOCTYPE html>
<html>

<head>
    <title>Employees</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>Employees</h2>

        <a href="/employee/add" class="btn btn-primary mb-3">
            Add Employee
        </a>

        <table class="table table-bordered">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Actions</th>
            </tr>

            {% for employee in employees %}
            <th>Actions</th>

            <tr>
                <td>{{ employee.id }}</td>
                <td>{{ employee.name }}</td>
                <td>{{ employee.department }}</td>
                <td>{{ employee.salary }}</td>

                <td>

                    <a href="/employee/edit/{{ employee.id }}" class="btn btn-warning">
                        Edit
                    </a>

                    <a href="/employee/delete/{{ employee.id }}" class="btn btn-danger">
                        Delete
                    </a>

                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>

</html>
