<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }
        .top-bar {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 2rem;
        }
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .table {
            margin-bottom: 0;
        }
        .table th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .table td {
            padding: 1rem;
            vertical-align: middle;
            color: #334155;
            font-size: 0.9rem;
        }
        .btn {
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="top-bar d-flex justify-content-between align-items-center mb-5">
        <a href="/dashboard" class="btn btn-outline-secondary px-3">
            &larr; Dashboard
        </a>
        <a href="/logout" class="btn btn-light text-danger border px-3">
            Logout
        </a>
    </div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark m-0">Employees</h2>
                <p class="text-muted small m-0">View and update directory records</p>
            </div>
            <a href="/employee/add" class="btn btn-primary px-4 py-2" style="background-color: #4361ee; border: none;">
                + Add Employee
            </a>
        </div>

        <div class="table-container">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Salary</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for employee in employees %}
                    <tr>
                        <td class="fw-semibold text-muted">#{{ employee.id }}</td>
                        <td class="fw-semibold">{{ employee.name }}</td>
                        <td><span class="badge bg-light text-dark border px-2.5 py-1.5">{{ employee.department }}</span></td>
                        <td class="fw-medium">${{ employee.salary }}</td>
                        <td class="text-end">
                            <a href="/employee/edit/{{ employee.id }}" class="btn btn-warning text-dark btn-sm me-1 px-3" style="background-color: #ffb703; border: none;">
                                Edit
                            </a>
                            <a href="/employee/delete/{{ employee.id }}" class="btn btn-danger btn-sm px-3" style="background-color: #e63946; border: none;">
                                Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
