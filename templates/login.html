<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}
    <style>
        body {
            background: radial-gradient(circle at 10% 20%, rgb(242, 246, 253) 0%, rgb(224, 233, 246) 90%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(166, 179, 194, 0.3);
            padding: 2.5rem;
            transition: transform 0.2s ease;
        }

        .form-control {
            border-radius: 8px;
            padding: 0.6rem 1rem;
            border: 1px solid #ced4da;
        }

        .form-control:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
        }

        .btn-primary {
            background-color: #4361ee;
            border: none;
            border-radius: 8px;
            padding: 0.7rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #3046d1;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark mb-1" style="letter-spacing: -0.5px;">Welcome Back</h2>
                        <p class="text-muted small">Employee Management System</p>
                    </div>

                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-medium">Email Address</label>
                            <input type="email" name="email" class="form-control" required
                                placeholder="name@company.com">
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-secondary small fw-medium">Password</label>
                            <input type="password" name="password" class="form-control" required placeholder="••••••••">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            Sign In
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted small">New to the platform?</span>
                        <a href="/register" class="text-decoration-none small fw-semibold ms-1"
                            style="color: #4361ee;">Register Here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
