<!DOCTYPE html>
<html>

<head>
    <title>Add Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Add Employee</h2>

    <form method="POST">

        <input
            class="form-control mb-3"
            name="name"
            placeholder="Name">

        <input
            class="form-control mb-3"
            name="department"
            placeholder="Department">

        <input
            class="form-control mb-3"
            name="salary"
            placeholder="Salary">

        <button
            class="btn btn-success">
            Save
        </button>

    </form>

</div>

</body>

</html>
