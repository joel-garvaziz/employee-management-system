<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }
        .form-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            padding: 2.5rem;
        }
        .form-control {
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            background-color: #f8fafc;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #2ec4b6;
            box-shadow: 0 0 0 4px rgba(46, 196, 182, 0.15);
        }
        .btn-success {
            background-color: #2ec4b6;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-success:hover {
            background-color: #259f93;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="mb-4">
                <a href="/employees" class="text-decoration-none text-muted small">&larr; Back to Directory</a>
            </div>
            
            <div class="form-card">
                <h3 class="fw-bold text-dark mb-4">Add Employee</h3>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-medium">Employee Name</label>
                        <input class="form-control" name="name" placeholder="e.g. Jane Doe" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-medium">Department</label>
                        <input class="form-control" name="department" placeholder="e.g. Engineering" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-medium">Annual Salary</label>
                        <input class="form-control" name="salary" placeholder="e.g. 85000" required>
                    </div>

                    <button class="btn btn-success w-100">
                        Save Employee Record
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
