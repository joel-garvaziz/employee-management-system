<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Employee Management Dashboard</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Total Employees</h5>
                    <h1>{{ total_employees }}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Departments</h5>
                    <h1>{{ total_departments }}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Registered Users</h5>
                    <h1>{{ total_users }}</h1>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <a href="/employees" class="btn btn-primary">
            Manage Employees
        </a>
    </div>

</div>

</body>
</html>
