services:
  mysql:
    image: mysql:8.0
    container_name: employee_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Root2025
      MYSQL_DATABASE: employee_management

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pRoot2025"]
      interval: 10s
      timeout: 5s
      retries: 10

  flask:
    build: .
    container_name: employee_flask
    restart: always

    env_file:
      - .env

    ports:
      - "5000:5000"

    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
